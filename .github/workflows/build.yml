name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Java 11 : LA version exacte requise par Cordova Android 10.x
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # Remplacement de Gradle 9 par Gradle 7.5.1
      - name: Force Gradle 7.5.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.5.1-bin.zip
          unzip -q gradle-7.5.1-bin.zip
          sudo rm -rf /usr/share/gradle
          sudo ln -s $PWD/gradle-7.5.1 /usr/share/gradle
          echo "$PWD/gradle-7.5.1/bin" >> $GITHUB_PATH

      # Installation des Build Tools 30.0.3 avec Java 11
      - name: Install Android Build Tools 30.0.3
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;30.0.3" "platforms;android-30" || true

      - name: Install Cordova & Build APK
        run: |
          npm install -g cordova@11.0.0
          cd AppNfc
          cordova platform add android@10.1.2
          cordova plugin add phonegap-nfc

          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: AppNfc/platforms/android/app/build/outputs/apk/debug/app-debug.apk