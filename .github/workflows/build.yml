name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # JDK 17 : utilisé UNIQUEMENT pour sdkmanager (qui en a besoin nativement)
      - name: Setup Java 17 (for sdkmanager only)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android Build Tools 30.0.3
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          sudo chown -R runner:docker $ANDROID_SDK_ROOT
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;30.0.3" "platforms;android-30"

      # JDK 11 : requis pour que Gradle 7.5.1 puisse compiler settings.gradle
      # (Gradle 7.5.1 ne sait pas lire du bytecode Java 17 -> "Unsupported class file major version 61")
      - name: Setup Java 11 (for Gradle/Cordova build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # Forcer Gradle 7.5.1
      - name: Force Gradle 7.5.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.5.1-bin.zip
          unzip -q gradle-7.5.1-bin.zip
          sudo rm -rf /usr/share/gradle
          sudo ln -s $PWD/gradle-7.5.1 /usr/share/gradle
          echo "$PWD/gradle-7.5.1/bin" >> $GITHUB_PATH

      - name: Install Cordova & Build APK
        run: |
          npm install -g cordova@11.0.0
          cd AppNfc
          cordova platform add android@10.1.2
          cordova plugin add phonegap-nfc

          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: AppNfc/platforms/android/app/build/outputs/apk/debug/app-debug.apk