name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova & Build APK
        run: |
          npm install -g cordova@12.0.0
          cd AppNfc
          cordova platform add android@11.0.0
          cordova plugin add phonegap-nfc
          
          # On génère le wrapper Gradle 8.5 pour empêcher Cordova d'utiliser Gradle 9
          cd platforms/android
          gradle wrapper --gradle-version 8.5
          
          # On revient à la racine du projet Cordova pour compiler
          cd ../..
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: AppNfc/platforms/android/app/build/outputs/apk/debug/app-debug.apk
