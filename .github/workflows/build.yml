name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Java 11 : stable avec Gradle 7
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # Remplace la version système de Gradle par la 7.5.1
      - name: Force Gradle 7.5.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.5.1-bin.zip
          unzip -q gradle-7.5.1-bin.zip
          sudo rm -rf /usr/share/gradle
          sudo ln -s $PWD/gradle-7.5.1 /usr/share/gradle
          echo "$PWD/gradle-7.5.1/bin" >> $GITHUB_PATH

      # Utilisation directe du SDK Android natif de la machine GitHub
      - name: Set Android Home
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install Cordova & Build APK
        run: |
          npm install -g cordova@11.0.0
          cd AppNfc
          cordova platform add android@10.1.2
          cordova plugin add phonegap-nfc

          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: AppNfc/platforms/android/app/build/outputs/apk/debug/app-debug.apk