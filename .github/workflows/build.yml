name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova & Build APK
        run: |
          npm install -g cordova@12.0.0
          cd AppNfc
          cordova platform add android@13.0.0
          
          # Nettoyage
          cordova plugin remove phonegap-nfc --force || true
          
          # Installation de la version à jour directement depuis GitHub
          cordova plugin add https://github.com/chce/phonegap-nfc.git

          # Configuration requise
          mkdir -p platforms/android
          echo "org.gradle.java.home=$JAVA_HOME" >> platforms/android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4096m -XX:+UseParallelGC" >> platforms/android/gradle.properties
          echo "android.useAndroidX=true" >> platforms/android/gradle.properties
          echo "android.enableJetifier=true" >> platforms/android/gradle.properties

          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: AppNfc/platforms/android/app/build/outputs/apk/debug/app-debug.apk
