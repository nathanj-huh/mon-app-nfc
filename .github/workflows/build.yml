name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Java 11 est indispensable pour que Cordova 10/11 et Gradle 7 fonctionnent sans bug XmlParser
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # On force la machine à utiliser Gradle 7.5.1 en REMPLAÇANT le Gradle 9 du système
      - name: Force Gradle 7.5.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.5.1-bin.zip
          unzip -q gradle-7.5.1-bin.zip
          sudo rm -rf /usr/share/gradle
          sudo ln -s $PWD/gradle-7.5.1 /usr/share/gradle
          echo "$PWD/gradle-7.5.1/bin" >> $GITHUB_PATH

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova & Build APK
        run: |
          npm install -g cordova@11.0.0
          cd AppNfc
          cordova platform add android@10.1.2
          cordova plugin add phonegap-nfc

          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: AppNfc/platforms/android/app/build/outputs/apk/debug/app-debug.apk
